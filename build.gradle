plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
    id 'maven-publish'
    id 'java'
}

version = project.mod_version
group = project.maven_group

repositories {
    mavenCentral()
}

loom {
    splitEnvironmentSourceSets()

    mods {
        "skija-test" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"

    implementation "net.fabricmc:fabric-loader:${project.loader_version}"

    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

    implementation "io.github.humbleui:skija-windows-x64:${project.skija_version}"

    implementation "net.jthink:jaudiotagger:3.0.1"

    implementation "com.googlecode.soundlibs:mp3spi:1.9.5.4"
    implementation "com.tianscar.javasound:javasound-flac:1.4.1"
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.toVersion(project.java_version)
    targetCompatibility = JavaVersion.toVersion(project.java_version)
}

tasks.withType(JavaCompile).configureEach {
    options.release = Integer.parseInt(project.java_version)
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}
